<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | MOVIEATS Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#FF6B00",
                    "surface": "#141414",
                    "surface-variant": "#1a1a1a",
                    "outline": "#1e1e1e",
                    "outline-variant": "#2a2a2a",
                    "on-surface": "#e5e2e1",
                    "on-surface-variant": "#a3a3a3",
            },
            "borderRadius": {
                    "card": "16px",
                    "input": "8px"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at center, rgba(255, 107, 0, 0.08) 0%, transparent 70%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-glow {
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5), 0 0 40px 0 rgba(255, 107, 0, 0.03);
        }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Login Card -->
<div class="w-full max-w-[400px] bg-surface border border-outline rounded-card p-8 login-card-glow">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<h1 class="font-headline text-2xl font-black tracking-tighter text-primary">MOVIEATS</h1>
</div>
<span class="text-[10px] uppercase tracking-widest font-semibold text-on-surface-variant">Painel Administrativo</span>
</div>
<!-- Header Section -->
<div class="mb-8">
<h2 class="font-headline text-xl font-bold text-white mb-1">Bem-vindo de volta</h2>
<p class="text-sm text-on-surface-variant">Acesso restrito à equipe interna</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant ml-1" for="email">E-mail corporativo</label>
<input class="w-full bg-surface-variant border-outline-variant rounded-input px-[14px] py-3 min-h-[48px] text-sm text-white placeholder:text-neutral-600 focus:border-primary/40 focus:ring-0 transition-all outline-none" id="email" name="email" placeholder="nome@movieats.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant ml-1" for="password">Senha</label>
<div class="relative group">
<input class="w-full bg-surface-variant border-outline-variant rounded-input px-[14px] py-3 min-h-[48px] text-sm text-white placeholder:text-neutral-600 focus:border-primary/40 focus:ring-0 transition-all outline-none pr-12" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-500 hover:text-white transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Action Row -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="h-4 w-4 rounded bg-surface-variant border-outline-variant text-primary focus:ring-0 focus:ring-offset-0 checked:bg-primary transition-all cursor-pointer" type="checkbox"/>
<span class="text-xs text-on-surface-variant group-hover:text-on-surface transition-colors">Manter conectado</span>
</label>
<a class="text-xs font-semibold text-primary hover:text-orange-400 transition-colors" href="#">Esqueci a senha</a>
</div>
<!-- Submit Button -->
<button class="w-full min-h-[48px] bg-primary hover:bg-[#e65a00] active:scale-[0.98] text-white font-semibold text-sm rounded-input shadow-lg shadow-primary/10 transition-all flex items-center justify-center gap-2" type="submit">
            Entrar no Painel
            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Card Footer -->
<div class="mt-10 text-center">
<p class="text-[11px] text-on-surface-variant/60">
            Problemas com acesso? <a class="text-on-surface-variant hover:text-white transition-colors underline decoration-on-surface-variant/20 underline-offset-4" href="#">Fale com o suporte</a>
</p>
</div>
</div>
</body></html>
